name: Real-World Frontend - Build & Push (DockerHub)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-push:
    runs-on: minikube-dind
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image (with shared /shared docker build cache)
        run: |
          mkdir -p /shared/docker-buildcache
          # --cache-from / --cache-to uses the shared PVC — survives across runs on same node
          docker build \
            --cache-from type=local,src=/shared/docker-buildcache \
            --cache-to   type=local,dest=/shared/docker-buildcache,mode=max \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:latest \
            ./frontend

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:latest

      - name: Deploy to Minikube Cluster (kubectl cached in /shared)
        run: |
          # Use cached kubectl from /shared to skip downloading each run
          if [ ! -f /shared/tool-cache/kubectl ]; then
            echo "kubectl not cached — downloading..."
            mkdir -p /shared/tool-cache
            curl -sLo /shared/tool-cache/kubectl \
              "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x /shared/tool-cache/kubectl
            echo "kubectl cached at /shared/tool-cache/kubectl"
          else
            echo "kubectl found in shared cache — skipping download!"
          fi

          # Replace image tag in manifest and apply
          sed -i "s/IMAGE_TAG/${{ github.sha }}/g" frontend/k8s-manifest.yaml
          /shared/tool-cache/kubectl apply -f frontend/k8s-manifest.yaml

