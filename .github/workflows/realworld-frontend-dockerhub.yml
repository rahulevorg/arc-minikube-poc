name: Real-World Frontend - Build & Push (DockerHub)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-push:
    runs-on: minikube-k8s
    container:
      image: moby/buildkit:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Docker Hub auth for BuildKit
        run: |
          mkdir -p "$HOME/.docker"
          AUTH_B64=$(printf '%s' "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" | base64 | tr -d '\n')
          cat > "$HOME/.docker/config.json" <<EOF
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "auth": "${AUTH_B64}"
              }
            }
          }
          EOF

      - name: Build and push Docker image via BuildKit daemon
        run: |
          buildctl --addr tcp://buildkitd.arc-runners.svc.cluster.local:1234 build \
            --frontend dockerfile.v0 \
            --local context=frontend \
            --local dockerfile=frontend \
            --output type=image,name=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:${{ github.sha }},docker.io/${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:latest,push=true

  deploy-to-minikube:
    runs-on: minikube-k8s
    needs: build-and-push
    container:
      image: bitnami/kubectl:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Minikube Cluster
        run: |
          sed -i "s#image: .*#image: ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:${{ github.sha }}#" frontend/k8s-manifest.yaml
          kubectl apply -f frontend/k8s-manifest.yaml

