name: Real-World Frontend - Build & Push (DockerHub)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-push:
    runs-on: minikube-k8s
    container:
      image: docker:27.1.2-cli
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (remote BuildKit)
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkitd.arc-runners.svc.cluster.local:1234

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:buildcache,mode=max

  deploy-to-minikube:
    runs-on: minikube-k8s
    needs: build-and-push
    container:
      image: bitnami/kubectl:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Minikube Cluster
        run: |
          sed -i "s#image: .*#image: ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:${{ github.sha }}#" frontend/k8s-manifest.yaml
          kubectl apply -f frontend/k8s-manifest.yaml

