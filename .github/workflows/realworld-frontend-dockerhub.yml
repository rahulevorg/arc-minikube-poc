name: Real-World Frontend - Build & Push (DockerHub)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:latest

  deploy-to-minikube:
    runs-on: minikube-k8s
    needs: build-and-push
    container:
      image: bitnami/kubectl:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Minikube Cluster
        run: |
          sed -i "s#image: .*#image: ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:${{ github.sha }}#" frontend/k8s-manifest.yaml
          kubectl apply -f frontend/k8s-manifest.yaml

