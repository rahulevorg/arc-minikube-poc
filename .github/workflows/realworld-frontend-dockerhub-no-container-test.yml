name: Real-World Frontend - No-Container Test

on:
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: minikube-k8s
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (remote BuildKit)
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkitd.arc-runners.svc.cluster.local:1234

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:buildcache,mode=max

  deploy-to-minikube:
    runs-on: minikube-k8s
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Minikube Cluster
        run: |
          sed -i "s#image: .*#image: ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-frontend:${{ github.sha }}#" frontend/k8s-manifest.yaml
          kubectl apply -f frontend/k8s-manifest.yaml

  cleanup-pods:
    runs-on: minikube-k8s
    if: always()
    needs:
      - build-and-push
      - deploy-to-minikube
    steps:
      - name: Auto cleanup completed and failed pods
        run: |
          kubectl delete pod -n arc-runners --field-selector=status.phase=Succeeded --ignore-not-found=true
          kubectl delete pod -n arc-runners --field-selector=status.phase=Failed --ignore-not-found=true