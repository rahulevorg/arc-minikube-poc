name: ARC No-Container Runner Smoke Test

on:
  workflow_dispatch: {}

jobs:
  no-container-smoke:
    runs-on: minikube-nocontainer
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify runner executes no-container job
        run: |
          echo "No-container runner validation"
          uname -a
          id
          ls -la

      - name: Install kubectl client
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.3

      - name: Verify Kubernetes API access
        run: |
          kubectl auth can-i get pods -n arc-runners
          kubectl get pods -n arc-runners --no-headers | head -n 5 || true