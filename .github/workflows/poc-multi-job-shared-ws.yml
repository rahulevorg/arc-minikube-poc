name: POC - Multi-Job Shared Workspace

# STRATEGY: prepare â†’ [parallel jobs] â†’ cleanup
#
# All jobs share /app/workspace/$GITHUB_RUN_ID/ on the RWX PVC mounted in every
# runner pod.  The lifecycle is:
#   1. prepare   â€” creates the run's slice, clones the repo into it
#   2. lint/test â€” parallel jobs that read the shared checkout (no re-clone)
#   3. build     â€” depends on lint+test, reads the same shared source
#   4. cleanup   â€” always runs; removes the run's slice from /app/workspace

on:
  workflow_dispatch: {}

env:
  SHARED_WS: /app/workspace/${{ github.run_id }}   # each run gets its own dir

jobs:
  # â”€â”€ 1. PREPARE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  prepare:
    runs-on: minikube-k8s
    container:
      image: node:20-bullseye
    steps:
      - name: Create shared workspace slice for this run
        run: |
          mkdir -p "$SHARED_WS"
          echo "Run #${{ github.run_number }} | ${{ github.sha }} | $(date -u)" \
            > "$SHARED_WS/run-info.txt"
          echo "Workspace created at $SHARED_WS"

      - name: Clone repository directly into shared workspace slice
        run: |
          git clone --depth 1 "https://github.com/${{ github.repository }}.git" "$SHARED_WS/src"
          git -C "$SHARED_WS/src" fetch --depth 1 origin "${{ github.sha }}"
          git -C "$SHARED_WS/src" checkout --detach "${{ github.sha }}"

      - name: Verify shared workspace contents
        run: |
          echo "=== Shared workspace after checkout ==="
          find "$SHARED_WS" -maxdepth 3 | head -40

  # â”€â”€ 2a. LINT (parallel with test) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  lint:
    runs-on: minikube-k8s
    container:
      image: node:20-bullseye
    needs: prepare
    steps:
      - name: Read shared workspace (no re-checkout needed)
        run: |
          echo "=== run-info.txt from prepare job ==="
          cat "$SHARED_WS/run-info.txt"
          echo "=== Files available from shared checkout ==="
          ls "$SHARED_WS/src/"

      - name: Simulate lint
        run: |
          echo "Running linter on shared source..."
          # Write lint result into shared ws so 'build' can inspect it
          echo "LINT_PASSED=true" > "$SHARED_WS/lint-result.txt"
          echo "Lint complete."

  # â”€â”€ 2b. TEST (parallel with lint) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  test:
    runs-on: minikube-k8s
    container:
      image: node:20-bullseye
    needs: prepare
    steps:
      - name: Read shared workspace (no re-checkout needed)
        run: |
          echo "=== run-info.txt from prepare job ==="
          cat "$SHARED_WS/run-info.txt"

      - name: Simulate unit tests
        run: |
          echo "Running tests on shared source..."
          echo "TEST_PASSED=true" > "$SHARED_WS/test-result.txt"
          echo "Tests complete."

  # â”€â”€ 3. BUILD (sequential after lint + test) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  build:
    runs-on: minikube-k8s
    container:
      image: node:20-bullseye
    needs: [lint, test]
    steps:
      - name: Verify results from parallel jobs
        run: |
          echo "=== Results written by parallel jobs ==="
          cat "$SHARED_WS/lint-result.txt"
          cat "$SHARED_WS/test-result.txt"

      - name: Install buildctl client
        run: |
          BK_VERSION="v0.23.2"
          mkdir -p "$RUNNER_TEMP/buildkit/bin"
          curl -sSL "https://github.com/moby/buildkit/releases/download/${BK_VERSION}/buildkit-${BK_VERSION}.linux-amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/buildkit" bin/buildctl
          echo "$RUNNER_TEMP/buildkit/bin" >> "$GITHUB_PATH"

      - name: Build frontend with remote BuildKit daemon
        run: |
          echo "Building image from $SHARED_WS/src/frontend with BuildKit..."
          buildctl --addr tcp://buildkitd.arc-runners.svc.cluster.local:1234 build \
            --frontend dockerfile.v0 \
            --local context="$SHARED_WS/src/frontend" \
            --local dockerfile="$SHARED_WS/src/frontend" \
            --output type=oci,dest="$SHARED_WS/frontend-image.tar"
          echo "BUILD_COMPLETE=true" > "$SHARED_WS/build-result.txt"

  # â”€â”€ 4. CLEANUP (always runs) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  cleanup:
    runs-on: minikube-k8s
    container:
      image: node:20-bullseye
    needs: [build]
    if: always()   # run even if build failed
    steps:
      - name: Show full run workspace before cleanup
        run: |
          echo "=== Final state of $SHARED_WS ==="
          find "$SHARED_WS" -type f | sort
          echo ""
          cat "$SHARED_WS/build-result.txt" 2>/dev/null || echo "(build did not complete)"

      - name: Remove this run's workspace slice
        run: |
          rm -rf "$SHARED_WS"
          echo "Cleaned up $SHARED_WS"
          echo "=== Remaining /app/workspace entries (other runs) ==="
          ls /app/workspace/ || echo "(shared volume empty)"
