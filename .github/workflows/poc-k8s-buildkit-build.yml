name: POC - GitHub Hosted Docker Build and Push
on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: read

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create demo Dockerfile
        run: |
          echo "FROM alpine:latest" > Dockerfile
          echo "RUN echo 'Hello from GitHub-hosted build!' > /hello.txt" >> Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-image:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/arc-poc-image:latest
