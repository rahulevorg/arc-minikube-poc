apiVersion: apps/v1
kind: Deployment
metadata:
  name: poc-frontend
  namespace: default
  labels:
    app: poc-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poc-frontend
  template:
    metadata:
      labels:
        app: poc-frontend
    spec:
      containers:
      - name: frontend
        image: rkundani/arc-poc-frontend:IMAGE_TAG
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: poc-frontend-svc
  namespace: default
spec:
  selector:
    app: poc-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: poc-frontend-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - host: arc-poc.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: poc-frontend-svc
            port:
              number: 80
